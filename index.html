<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>大阪市 介護営業ルートアプリ</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f1f5f9;color:#0f172a}
.wrap{max-width:1100px;margin:auto;padding:14px}.hero{background:#020617;color:white;border-radius:24px;padding:22px;margin-bottom:14px}
.card{background:white;border:1px solid #e2e8f0;border-radius:18px;padding:14px;margin:10px 0}
input,select,textarea,button,a.btn{font:inherit;border-radius:10px;border:1px solid #cbd5e1;padding:10px;background:white}
input,select,textarea{width:100%}button,a.btn{font-weight:700;cursor:pointer;text-decoration:none;color:#0f172a;display:inline-block}
.primary{background:#020617!important;color:white!important;border-color:#020617!important}.good{background:#ecfdf5!important;color:#047857!important;border-color:#a7f3d0!important}
.grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px}.layout{display:grid;grid-template-columns:1.6fr 1fr;gap:12px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.muted{color:#64748b;font-size:14px}
.section{background:#020617;color:white;border-radius:14px;padding:10px 12px;margin:14px 0 8px;display:flex;justify-content:space-between}.record{text-align:left;width:100%}.record.active{outline:3px solid #020617}
.badge{display:inline-block;background:#f1f5f9;border-radius:999px;padding:4px 8px;font-size:12px;font-weight:700;margin:2px}.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.actions button{font-size:13px;padding:7px 9px}
.route{display:flex;gap:8px;overflow-x:auto}.routeItem{min-width:230px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:14px;padding:10px}
table{width:100%;border-collapse:collapse;font-size:14px}td,th{border-bottom:1px solid #e2e8f0;text-align:left;padding:8px}.hidden{display:none}
@media(max-width:800px){.grid,.layout{grid-template-columns:1fr}.wrap{padding:10px}}
</style>
</head>
<body>
<div class="wrap">
<header class="hero">
<h1>大阪市 介護営業ルートアプリ</h1>
<p>GitHub Pagesでそのまま開ける単独HTML版です。電話・地図・現在地ルート・訪問記録が使えます。</p>
<div class="row">
<button class="primary" id="exportRecords">営業リストCSV</button>
<button id="reset">初期化</button>
</div>
</header>

<section class="card">
<div class="grid">
<input id="q" placeholder="検索">
<select id="ward"></select><select id="type"></select><select id="status"></select>
</div>
<div class="card" style="background:#eff6ff">
<div class="row">
<button class="primary" id="locate">現在地取得</button>
<button id="sortNear">近い順</button>
<select id="nearN"><option value="3">近くの3件</option><option value="5">近くの5件</option><option value="10">近くの10件</option></select>
<button id="addNear">近い事業所をルート追加</button>
<span class="muted" id="locMsg">位置情報未取得</span>
</div>
</div>
</section>

<section class="card">
<div class="row">
<input id="date" type="date"><input id="note" placeholder="訪問メモ">
<button class="primary" id="openRoute">ルート地図</button><button id="clearRoute">クリア</button>
</div>
<div id="route" class="route"></div>
</section>

<main class="layout">
<section id="records"></section>
<aside class="card" id="detail"></aside>
</main>

<section class="card">
<div class="row"><b>訪問記録</b><button id="exportVisits">訪問記録CSV</button><button id="clearVisits">記録クリア</button></div>
<div id="visits"></div>
</section>
</div>

<script>
const WARDS=['すべて','北区','中央区','西区','港区','淀川区','阿倍野区','住之江区','西成区','区未設定'];
const TYPES=['すべて','地域包括支援センター','居宅介護支援事業所'];
const STATUSES=['すべて','未アプローチ','電話済','訪問予定','訪問済','商談化','契約済'];
const K={r:'osaka-care-records-simple-v1',rt:'osaka-care-route-simple-v1',v:'osaka-care-visits-simple-v1'};
function rec(id,type,ward,name,address,phone,lat,lng){return{id,type,ward,name,address,phone,lat,lng,status:'未アプローチ',memo:''}}
const INIT=[
rec('h1','地域包括支援センター','北区','北区地域包括支援センター','大阪市北区神山町15-11','06-6313-5568',34.7039,135.5074),
rec('h2','地域包括支援センター','中央区','中央区地域包括支援センター','大阪市中央区上本町西2-5-25','06-6763-8139',34.6778,135.5206),
rec('h3','地域包括支援センター','西区','西区地域包括支援センター','大阪市西区新町4-5-14','06-6539-8075',34.6746,135.4868),
rec('k1','居宅介護支援事業所','北区','済生会中津病院','大阪市北区芝田2-10-39','06-6372-0733',34.7073,135.4947),
rec('k2','居宅介護支援事業所','港区','コープみなと介護よろず相談所','大阪市港区磯路三丁目3番4号','06-6571-7880',34.6655,135.4576),
rec('k3','居宅介護支援事業所','西成区','今宮ケアプランセンター','大阪市西成区天下茶屋一丁目31番9号','06-6656-6300',34.6365,135.5003)
];
let records=load(K.r,INIT), route=load(K.rt,[]), visits=load(K.v,[]), selected=records[0].id, loc=null, near=false;
const $=id=>document.getElementById(id);
function load(k,f){try{return JSON.parse(localStorage.getItem(k))||f}catch{return f}}
function save(){localStorage.setItem(K.r,JSON.stringify(records));localStorage.setItem(K.rt,JSON.stringify(route));localStorage.setItem(K.v,JSON.stringify(visits))}
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
function dkm(a,b){if(!a||!b.lat||!b.lng)return null;let R=6371,rad=x=>x*Math.PI/180,dlat=rad(b.lat-a.lat),dlng=rad(b.lng-a.lng),h=Math.sin(dlat/2)**2+Math.cos(rad(a.lat))*Math.cos(rad(b.lat))*Math.sin(dlng/2)**2;return R*2*Math.atan2(Math.sqrt(h),Math.sqrt(1-h))}
function dt(k){return k==null?'':k<1?'約'+Math.round(k*1000)+'m':'約'+k.toFixed(1)+'km'}
function enr(){return records.map(r=>({...r,distanceKm:dkm(loc,r)}))}
function filt(){let q=$('q').value.toLowerCase(),w=$('ward').value,t=$('type').value,s=$('status').value,l=enr().filter(r=>[r.type,r.ward,r.name,r.address,r.phone,r.memo].join(' ').toLowerCase().includes(q)&&(w=='すべて'||r.ward==w)&&(t=='すべて'||r.type==t)&&(s=='すべて'||r.status==s));if(near&&loc)l.sort((a,b)=>(a.distanceKm??9999)-(b.distanceKm??9999));return l}
function rr(){return route.map(id=>enr().find(r=>r.id==id)).filter(Boolean)}
function render(){save();renderRecords();renderRoute();renderDetail();renderVisits()}
function renderRecords(){let g={};filt().forEach(r=>(g[r.ward]??=[]).push(r));$('records').innerHTML=Object.keys(g).map(k=>'<div class="section"><b>'+k+'</b><span>'+g[k].length+'件</span></div>'+g[k].map(r=>'<button class="card record '+(r.id==selected?'active':'')+'" onclick="sel(\''+r.id+'\')"><span class="badge">'+esc(r.type)+'</span><span class="badge">'+esc(r.status)+'</span>'+(r.distanceKm!=null?'<span class="badge">'+dt(r.distanceKm)+'</span>':'')+'<h3>'+esc(r.name)+'</h3><div class="muted">📍 '+esc(r.address)+'</div><div class="muted">☎ '+esc(r.phone)+'</div><div class="actions"><button class="primary" onclick="event.stopPropagation();call(\''+esc(r.phone)+'\')">電話</button><button onclick="event.stopPropagation();one(\''+r.id+'\')">地図</button><button onclick="event.stopPropagation();toggle(\''+r.id+'\')">'+(route.includes(r.id)?'追加済':'ルート追加')+'</button><button onclick="event.stopPropagation();plan(\''+r.id+'\')">訪問予定</button><button onclick="event.stopPropagation();done(\''+r.id+'\')">訪問済</button></div></button>').join('')).join('')||'<div class="card muted">該当なし</div>'}
function renderRoute(){let list=rr();$('route').innerHTML=list.length?list.map((r,i)=>'<div class="routeItem"><b>'+(i+1)+'件目 '+esc(r.ward)+' '+dt(r.distanceKm)+'</b><div>'+esc(r.name)+'</div><div class="muted">'+esc(r.address)+'</div></div>').join(''):'<div class="muted">ルート追加すると表示されます。</div>'}
function renderDetail(){let r=enr().find(x=>x.id==selected)||enr()[0];$('detail').innerHTML='<h2>'+esc(r.name)+'</h2><p class="muted">'+esc(r.address)+'</p>'+(r.distanceKm!=null?'<b>現在地から'+dt(r.distanceKm)+'</b>':'')+'<p>☎ '+esc(r.phone)+'</p><label>状態</label><select onchange="upd(\''+r.id+'\',{status:this.value})">'+STATUSES.filter(x=>x!='すべて').map(s=>'<option '+(s==r.status?'selected':'')+'>'+s+'</option>').join('')+'</select><label>メモ</label><textarea onchange="upd(\''+r.id+'\',{memo:this.value})">'+esc(r.memo)+'</textarea><div class="actions"><button class="primary" onclick="call(\''+esc(r.phone)+'\')">電話</button><button onclick="one(\''+r.id+'\')">地図</button><button onclick="toggle(\''+r.id+'\')">ルート追加</button><button onclick="done(\''+r.id+'\')">訪問済</button></div>'}
function renderVisits(){$('visits').innerHTML=visits.length?'<table><tr><th>日付</th><th>区</th><th>事業所</th><th>電話</th><th>メモ</th></tr>'+visits.map(v=>'<tr><td>'+esc(v.date)+'</td><td>'+esc(v.ward)+'</td><td>'+esc(v.name)+'</td><td>'+esc(v.phone)+'</td><td>'+esc(v.note)+'</td></tr>').join('')+'</table>':'<div class="muted">まだありません。</div>'}
function sel(id){selected=id;render()}function upd(id,p){records=records.map(r=>r.id==id?{...r,...p}:r);render()}
function call(p){if(p)location.href='tel:'+p}function toggle(id){route=route.includes(id)?route.filter(x=>x!=id):[...route,id];render()}
function plan(id){upd(id,{status:'訪問予定'});if(!route.includes(id))route.push(id);render()}
function done(id){let r=records.find(x=>x.id==id);visits.unshift({date:$('date').value,ward:r.ward,name:r.name,phone:r.phone,note:$('note').value||'訪問済み'});records=records.map(x=>x.id==id?{...x,status:'訪問済'}:x);route=route.filter(x=>x!=id);render()}
function mapUrl(items){let stops=items.map(r=>encodeURIComponent(r.address));let start=loc?encodeURIComponent(loc.lat+','+loc.lng):encodeURIComponent('現在地');return 'https://www.google.com/maps/dir/'+start+'/'+stops.join('/')}
function one(id){let r=enr().find(x=>x.id==id);open(mapUrl([r]),'_blank')}function openRoute(){let list=rr();if(list.length)open(mapUrl(list),'_blank')}
function locate(){navigator.geolocation.getCurrentPosition(p=>{loc={lat:p.coords.latitude,lng:p.coords.longitude};near=true;$('locMsg').textContent='現在地取得済み';render()},()=>{$('locMsg').textContent='位置情報を許可してください。'},{enableHighAccuracy:true,timeout:10000})}
function addNear(){if(!loc){locate();return}let ids=filt().filter(r=>r.status!='訪問済'&&r.distanceKm!=null).sort((a,b)=>a.distanceKm-b.distanceKm).slice(0,Number($('nearN').value)).map(r=>r.id);route=[...new Set([...route,...ids])];render()}
function csv(rows,heads){let e=v=>'"'+String(v??'').replaceAll('"','""')+'"';return '\uFEFF'+heads.join(',')+'\n'+rows.map(r=>heads.map(h=>e(r[h])).join(',')).join('\n')}
function dl(n,t){let b=new Blob([t],{type:'text/csv'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=n;a.click();URL.revokeObjectURL(u)}
function init(){WARDS.forEach(x=>$('ward').add(new Option(x)));TYPES.forEach(x=>$('type').add(new Option(x)));STATUSES.forEach(x=>$('status').add(new Option(x)));$('date').value=new Date().toISOString().slice(0,10);['q','ward','type','status'].forEach(id=>$(id).oninput=render);$('locate').onclick=locate;$('sortNear').onclick=()=>{near=!near;render()};$('addNear').onclick=addNear;$('openRoute').onclick=openRoute;$('clearRoute').onclick=()=>{route=[];render()};$('exportRecords').onclick=()=>dl('records.csv',csv(records,['type','ward','name','address','phone','status','memo']));$('exportVisits').onclick=()=>dl('visits.csv',csv(visits,['date','ward','name','phone','note']));$('clearVisits').onclick=()=>{visits=[];render()};$('reset').onclick=()=>{records=INIT;route=[];visits=[];selected=records[0].id;render()};render()}
init();
</script>
</body>
</html>
