<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>営業アプリ｜確認版</title>
  <style>
    body{
      margin:0;
      font-family:"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      background:#f4f7fb;
      color:#222;
      padding:20px;
    }
    .box{
      max-width:900px;
      margin:0 auto;
      background:#fff;
      border-radius:16px;
      padding:16px;
      box-shadow:0 8px 22px rgba(0,0,0,.08);
    }
    h1{
      margin:0 0 16px;
      color:#2146d0;
    }
    .row{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:12px;
    }
    select,input,button{
      border:1px solid #dbe3f2;
      border-radius:12px;
      padding:10px 12px;
      font-size:14px;
      background:#fff;
    }
    input[type="text"]{
      flex:1;
      min-width:220px;
    }
    button{
      border:none;
      background:#2146d0;
      color:#fff;
      cursor:pointer;
    }
    .status{
      margin:10px 0 16px;
      padding:10px 12px;
      background:#f7faff;
      border:1px solid #e1e9fb;
      border-radius:12px;
      font-size:13px;
      color:#3b4d6b;
      line-height:1.7;
    }
    .card{
      border:1px solid #dbe3f2;
      border-radius:12px;
      padding:12px;
      margin-bottom:10px;
      background:#fafcff;
    }
    .name{
      font-weight:700;
      font-size:18px;
      margin-bottom:6px;
    }
    .meta{
      font-size:14px;
      line-height:1.7;
      color:#445;
    }
    .badge{
      display:inline-block;
      font-size:12px;
      padding:4px 8px;
      border-radius:999px;
      background:#eef3ff;
      color:#2146d0;
      margin-top:8px;
      margin-right:6px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>営業アプリ確認版</h1>

    <div class="row">
      <select id="wardFilter">
        <option value="all">全区</option>
      </select>

      <select id="typeFilter">
        <option value="all">全種別</option>
        <option value="地域包括支援センター">地域包括支援センター</option>
        <option value="総合相談窓口（ブランチ）">総合相談窓口（ブランチ）</option>
        <option value="居宅介護支援事業所">居宅介護支援事業所</option>
        <option value="訪問介護">訪問介護</option>
      </select>

      <input id="keyword" type="text" placeholder="区名・駅名・事業所名・住所・電話で検索" />

      <button id="searchBtn">絞り込み</button>
      <button id="resetBtn">リセット</button>
    </div>

    <div class="row">
      <input id="csvFile" type="file" accept=".csv,text/csv" multiple />
      <button id="loadCsvBtn">CSV読込</button>
    </div>

    <div id="status" class="status">地域包括・ブランチを表示中です。</div>

    <div id="list"></div>
  </div>

  <script>
    const OSAKA_WARDS = [
      "北区","都島区","福島区","此花区","中央区","西区","港区","大正区","天王寺区","浪速区",
      "西淀川区","淀川区","東淀川区","東成区","生野区","旭区","城東区","鶴見区","阿倍野区",
      "住之江区","住吉区","東住吉区","平野区","西成区"
    ];

    const offices = [
      {
        id: "hokatsu-chuo",
        ward: "中央区",
        type: "地域包括支援センター",
        name: "中央区地域包括支援センター",
        address: "大阪市中央区上本町西2-5-25",
        phone: "06-6763-8139",
        keywords: "中央区 谷町六丁目駅 谷六 上本町"
      },
      {
        id: "hokatsu-chuo-hokubu",
        ward: "中央区",
        type: "地域包括支援センター",
        name: "中央区北部地域包括支援センター",
        address: "大阪市中央区農人橋3-1-3",
        phone: "06-6944-2116",
        keywords: "中央区 本町駅 堺筋本町駅 谷町四丁目駅"
      },
      {
        id: "hokatsu-kita",
        ward: "北区",
        type: "地域包括支援センター",
        name: "北区地域包括支援センター",
        address: "大阪市北区神山町15-11",
        phone: "06-6313-5568",
        keywords: "北区 扇町駅 中崎町駅 梅田駅"
      },
      {
        id: "branch-kita-umeda",
        ward: "北区",
        type: "総合相談窓口（ブランチ）",
        name: "梅田東ブランチ",
        address: "大阪市北区芝田2-10-39",
        phone: "06-6372-0804",
        keywords: "北区 梅田駅 大阪駅 中津駅"
      },
      {
        id: "hokatsu-tennoji",
        ward: "天王寺区",
        type: "地域包括支援センター",
        name: "天王寺区地域包括支援センター",
        address: "大阪市天王寺区六万体町5-26",
        phone: "06-6774-3386",
        keywords: "天王寺区 四天王寺前夕陽ヶ丘駅 谷町九丁目駅"
      },
      {
        id: "hokatsu-abeno",
        ward: "阿倍野区",
        type: "地域包括支援センター",
        name: "阿倍野区地域包括支援センター",
        address: "大阪市阿倍野区帝塚山1-3-8",
        phone: "06-6628-1400",
        keywords: "阿倍野区 姫松駅 帝塚山駅 阿倍野駅"
      }
    ];

    const wardFilter = document.getElementById("wardFilter");
    const typeFilter = document.getElementById("typeFilter");
    const keywordInput = document.getElementById("keyword");
    const listEl = document.getElementById("list");
    const statusEl = document.getElementById("status");
    const csvFileEl = document.getElementById("csvFile");

    function normalizeText(text){
      return String(text || "")
        .toLowerCase()
        .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
        .replace(/\s+/g, " ")
        .replace(/　/g, " ")
        .trim();
    }

    function wardFromAddress(address){
      return OSAKA_WARDS.find(w => String(address || "").includes(w)) || "";
    }

    function safeId(text){
      return text.toLowerCase().replace(/\s+/g, "-").replace(/[^\w\u3040-\u30ff\u3400-\u9fff-]/g, "").slice(0, 80) || ("office-" + Date.now());
    }

    function rebuildWardOptions(){
      const wards = [...new Set(offices.map(o => o.ward))].sort((a,b)=>a.localeCompare(b,"ja"));
      wardFilter.innerHTML = '<option value="all">全区</option>';
      wards.forEach(ward => {
        const option = document.createElement("option");
        option.value = ward;
        option.textContent = ward;
        wardFilter.appendChild(option);
      });
    }

    function getFilteredData(){
      const ward = wardFilter.value;
      const type = typeFilter.value;
      const keyword = normalizeText(keywordInput.value);

      return offices.filter(office => {
        const wardOk = ward === "all" || office.ward === ward;
        const typeOk = type === "all" || office.type === type;

        const searchTarget = normalizeText([
          office.ward,
          office.type,
          office.name,
          office.address,
          office.phone,
          office.keywords || ""
        ].join(" "));

        const keywordOk = !keyword || searchTarget.includes(keyword);
        return wardOk && typeOk && keywordOk;
      });
    }

    function renderList(data){
      listEl.innerHTML = "";

      if (!data.length) {
        listEl.innerHTML = '<div class="card">該当する営業先がありません。</div>';
        return;
      }

      data.forEach((office) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="name">${office.name}</div>
          <div class="meta">
            区: ${office.ward}<br>
            種別: ${office.type}<br>
            住所: ${office.address}<br>
            電話: ${office.phone || ""}
          </div>
          <div>
            <span class="badge">${office.type}</span>
            <span class="badge">${office.ward}</span>
          </div>
        `;
        listEl.appendChild(card);
      });
    }

    function applyFilters(){
      renderList(getFilteredData());
      statusEl.textContent = "絞り込みを反映しました。";
    }

    function resetFilters(){
      wardFilter.value = "all";
      typeFilter.value = "all";
      keywordInput.value = "";
      renderList(offices);
      statusEl.textContent = "表示をリセットしました。";
    }

    function parseCsvLine(line){
      const result = [];
      let cur = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') {
            cur += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === "," && !inQuotes) {
          result.push(cur);
          cur = "";
        } else {
          cur += ch;
        }
      }
      result.push(cur);
      return result.map(v => v.trim());
    }

    async function decodeCsvFile(file){
      const buffer = await file.arrayBuffer();
      const bytes = new Uint8Array(buffer);

      try {
        return new TextDecoder("utf-8", { fatal: true }).decode(bytes);
      } catch (e) {}

      try {
        return new TextDecoder("shift-jis").decode(bytes);
      } catch (e) {}

      return new TextDecoder("utf-8").decode(bytes);
    }

    function findHeaderIndex(headers, candidates){
      const normalizedHeaders = headers.map(h => normalizeText(h));
      for (const c of candidates) {
        const target = normalizeText(c);
        const idx = normalizedHeaders.findIndex(h => h.includes(target));
        if (idx !== -1) return idx;
      }
      return -1;
    }

    function addOfficeRecord({ ward, type, name, address, phone }){
      if (!name || !address) return false;

      const fixedWard = ward || wardFromAddress(address);
      if (!fixedWard) return false;

      const id = safeId(`${fixedWard}-${type}-${name}-${phone}-${address}`);
      if (offices.some(o => o.id === id)) return false;

      offices.push({
        id,
        ward: fixedWard,
        type,
        name,
        address,
        phone: phone || "",
        keywords: `${fixedWard} ${name}`
      });
      return true;
    }

    async function loadCsv(){
      const files = Array.from(csvFileEl.files || []);
      if (!files.length) {
        alert("CSVを選んでください。");
        return;
      }

      let importedTotal = 0;
      const messages = [];

      for (const file of files) {
        try {
          const text = await decodeCsvFile(file);
          const lines = text.split(/\r?\n/).filter(Boolean);

          if (lines.length < 2) {
            messages.push(`${file.name}: データがありません`);
            continue;
          }

          const headers = parseCsvLine(lines[0]);

          const idxServiceCode = findHeaderIndex(headers, ["サービス種別コード"]);
          const idxName = findHeaderIndex(headers, ["事業所_名称（漢字）", "事業所名称", "名称（漢字）"]);
          const idxAddress = findHeaderIndex(headers, ["事業所_住所（漢字）", "事業所所在地", "住所（漢字）", "所在地"]);
          const idxPhone = findHeaderIndex(headers, ["事業所_電話番号", "電話番号"]);

          if (idxName === -1 || idxAddress === -1) {
            messages.push(`${file.name}: 必要な列が見つかりません`);
            continue;
          }

          let fileImported = 0;

          for (let i = 1; i < lines.length; i++) {
            const cols = parseCsvLine(lines[i]);

            const name = idxName !== -1 ? (cols[idxName] || "") : "";
            const address = idxAddress !== -1 ? (cols[idxAddress] || "") : "";
            const phone = idxPhone !== -1 ? (cols[idxPhone] || "") : "";
            const serviceCode = idxServiceCode !== -1 ? (cols[idxServiceCode] || "") : "";

            if (!name || !address) continue;

            const ward = wardFromAddress(address);
            if (!ward) continue;

            let type = "";
            if (serviceCode === "43" || normalizeText(file.name).includes("kyotaku")) {
              type = "居宅介護支援事業所";
            } else if (serviceCode === "11" || normalizeText(file.name).includes("houmon")) {
              type = "訪問介護";
            } else {
              continue;
            }

            const added = addOfficeRecord({
              ward,
              type,
              name,
              address,
              phone
            });

            if (added) fileImported++;
          }

          importedTotal += fileImported;
          messages.push(`${file.name}: ${fileImported}件追加`);
        } catch (error) {
          console.error(error);
          messages.push(`${file.name}: 読み込み失敗`);
        }
      }

      rebuildWardOptions();
      renderList(offices);

      if (importedTotal === 0) {
        statusEl.innerHTML = `追加できませんでした。 ${messages.join(" / ")}`;
      } else {
        statusEl.innerHTML = `読み込み完了。 ${messages.join(" / ")}`;
      }
    }

    document.getElementById("searchBtn").addEventListener("click", applyFilters);
    document.getElementById("resetBtn").addEventListener("click", resetFilters);
    document.getElementById("loadCsvBtn").addEventListener("click", loadCsv);

    rebuildWardOptions();
    renderList(offices);
  </script>
</body>
</html>
