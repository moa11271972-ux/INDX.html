<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>営業アプリ｜完全書き換え版</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      background: #f4f7fb;
      color: #222;
    }
    header {
      background: linear-gradient(135deg,#2146d0,#4f7cff);
      color: #fff;
      padding: 16px;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
    }
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px;
    }
    .box {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(0,0,0,.08);
      margin-bottom: 14px;
      padding: 14px;
    }
    .notice {
      background: #fff8e8;
      border: 1px solid #f3d38f;
      color: #6c4d00;
      border-radius: 12px;
      padding: 12px;
      line-height: 1.8;
      font-size: 13px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    select, input, button, textarea {
      border: 1px solid #dbe3f2;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      background: #fff;
    }
    input[type="text"] {
      min-width: 220px;
      flex: 1;
    }
    button {
      border: none;
      background: #2146d0;
      color: #fff;
      cursor: pointer;
    }
    button:hover { opacity: .92; }
    .status {
      margin-top: 8px;
      padding: 10px 12px;
      background: #f7faff;
      border: 1px solid #e1e9fb;
      border-radius: 12px;
      font-size: 13px;
      color: #3b4d6b;
      line-height: 1.7;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    .chip {
      background: #eef3ff;
      color: #2146d0;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }
    .list {
      display: grid;
      gap: 10px;
    }
    .card {
      border: 1px solid #dbe3f2;
      border-radius: 14px;
      background: #fafcff;
      padding: 14px;
    }
    .name {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 6px;
      color: #21345f;
    }
    .meta {
      font-size: 14px;
      line-height: 1.8;
      color: #445;
    }
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef3ff;
      color: #2146d0;
    }
    .small {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      line-height: 1.6;
    }
    .empty {
      text-align: center;
      color: #666;
      padding: 20px;
      border: 1px dashed #ccd6ea;
      border-radius: 12px;
      background: #fcfdff;
    }
  </style>
</head>
<body>
  <header>営業アプリ｜完全書き換え版</header>

  <div class="wrap">
    <div class="box">
      <div class="notice">
        地域包括・ブランチは最初から表示されます。<br>
        その上に、CSVを選ぶと居宅介護支援事業所・訪問介護を追加できます。<br>
        一覧が出ることを最優先にした版です。
      </div>
    </div>

    <div class="box">
      <div class="row">
        <select id="wardFilter">
          <option value="all">全区</option>
        </select>

        <select id="typeFilter">
          <option value="all">全種別</option>
          <option value="地域包括支援センター">地域包括支援センター</option>
          <option value="総合相談窓口（ブランチ）">総合相談窓口（ブランチ）</option>
          <option value="居宅介護支援事業所">居宅介護支援事業所</option>
          <option value="訪問介護">訪問介護</option>
        </select>

        <input id="keyword" type="text" placeholder="区名・駅名・事業所名・住所・電話で検索" />

        <button id="searchBtn">絞り込み</button>
        <button id="resetBtn">リセット</button>
      </div>

      <div class="row">
        <input id="csvFile" type="file" accept=".csv,text/csv" multiple />
        <button id="loadCsvBtn">CSV読込</button>
      </div>

      <div id="status" class="status">地域包括・ブランチを表示中です。</div>

      <div class="chips">
        <div class="chip" id="totalCount">全件: 0</div>
        <div class="chip" id="hokatsuCount">地域包括等: 0</div>
        <div class="chip" id="kyotakuCount">居宅: 0</div>
        <div class="chip" id="houmonCount">訪問介護: 0</div>
      </div>
    </div>

    <div class="box">
      <div id="list" class="list"></div>
    </div>
  </div>

  <script>
    const OSAKA_WARDS = [

      "西淀川区","淀川区","東淀川区","東成区","生野区","旭区","城東区","鶴見区","阿倍野区",

      "福島区":["福島駅","新福島駅","海老江駅","野田駅","野田阪神駅"],

      "西区":["西長堀駅","阿波座駅","西大橋駅","四ツ橋駅"],

      "天王寺区":["天王寺駅","谷町九丁目駅","桃谷駅","四天王寺前夕陽ヶ丘駅"],
      "浪速区":["なんば駅","難波駅","大国町駅","恵美須町駅","新今宮駅"],

      "平野区":["平野駅","喜連瓜破駅","出戸駅"],

    const offices = [
      {
        id: "hokatsu-chuo",

        type: "地域包括支援センター",
        name: "中央区地域包括支援センター",

        checked: "2026-04-22",

      },
      {

        ward: "中央区",
        type: "地域包括支援センター",

        source: "初期登録",

        keywords: "中央区 本町駅 堺筋本町駅 谷町四丁目駅"
      },
      {

        ward: "北区",
        type: "地域包括支援センター",
        name: "北区地域包括支援センター",
        address: "大阪市北区神山町15-11",
        phone: "06-6313-5568",
        source: "初期登録",
        checked: "2026-04-22",
        keywords: "北区 扇町駅 中崎町駅 梅田駅"
      },
      {
        id: "branch-kita-umeda",
        ward: "北区",
        type: "総合相談窓口（ブランチ）",
        name: "梅田東ブランチ",
        address: "大阪市北区芝田2-10-39",
        phone: "06-6372-0804",
        source: "初期登録",
        checked: "2026-04-22",
        keywords: "北区 梅田駅 大阪駅 中津駅"
      },
      {
        id: "hokatsu-tennoji",
        ward: "天王寺区",
        type: "地域包括支援センター",
        name: "天王寺区地域包括支援センター",
        address: "大阪市天王寺区六万体町5-26",
        phone: "06-6774-3386",
        source: "初期登録",
        checked: "2026-04-22",
        keywords: "天王寺区 四天王寺前夕陽ヶ丘駅 谷町九丁目駅"
      },
      {
        id: "hokatsu-abeno",
        ward: "阿倍野区",
        type: "地域包括支援センター",
        name: "阿倍野区地域包括支援センター",
        address: "大阪市阿倍野区帝塚山1-3-8",
        phone: "06-6628-1400",
        source: "初期登録",
        checked: "2026-04-22",
        keywords: "阿倍野区 姫松駅 帝塚山駅 阿倍野駅"
      },
      {
        id: "hokatsu-naniwa",
        ward: "浪速区",
        type: "地域包括支援センター",
        name: "浪速区地域包括支援センター",
        address: "大阪市浪速区難波中3-8-8",
        phone: "06-6636-6029",
        source: "初期登録",
        checked: "2026-04-22",
        keywords: "浪速区 なんば駅 難波駅 大国町駅"
      },
      {
        id: "hokatsu-nishi",
        ward: "西区",
        type: "地域包括支援センター",
        name: "西区地域包括支援センター",
        address: "大阪市西区新町4-5-14",
        phone: "06-6539-8075",
        source: "初期登録",
        checked: "2026-04-22",
        keywords: "西区 西長堀駅 阿波座駅 西大橋駅"
      }
    ];

    const wardFilter = document.getElementById("wardFilter");
    const typeFilter = document.getElementById("typeFilter");
    const keywordInput = document.getElementById("keyword");
    const listEl = document.getElementById("list");
    const statusEl = document.getElementById("status");
    const totalCountEl = document.getElementById("totalCount");
    const hokatsuCountEl = document.getElementById("hokatsuCount");
    const kyotakuCountEl = document.getElementById("kyotakuCount");
    const houmonCountEl = document.getElementById("houmonCount");
    const csvFileEl = document.getElementById("csvFile");

    function normalizeText(text){
      return String(text || "")
        .toLowerCase()
        .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
        .replace(/\s+/g, " ")
        .replace(/　/g, " ")
        .replace(/ヶ/g, "ケ")
        .replace(/之/g, "の")
        .replace(/－/g, "-")
        .trim();
    }

    function wardFromAddress(address){
      return OSAKA_WARDS.find(w => String(address || "").includes(w)) || "";
    }

    function safeId(text){
      return text.toLowerCase().replace(/\s+/g, "-").replace(/[^\w\u3040-\u30ff\u3400-\u9fff-]/g, "").slice(0, 80) || ("office-" + Date.now());
    }

    function buildKeywords(ward, name){
      return [ward, name, ...(WARD_STATIONS[ward] || [])].join(" ");
    }

    function rebuildWardOptions(){
      const wards = [...new Set(offices.map(o => o.ward))].sort((a,b)=>a.localeCompare(b,"ja"));
      const current = wardFilter.value || "all";
      wardFilter.innerHTML = `<option value="all">全区</option>`;
      wards.forEach(ward => {
        const option = document.createElement("option");
        option.value = ward;
        option.textContent = ward;
        wardFilter.appendChild(option);
      });
      if ([...wardFilter.options].some(o => o.value === current)) {
        wardFilter.value = current;
      }
    }

    function getFilteredData(){
      const ward = wardFilter.value;
      const type = typeFilter.value;
      const keyword = normalizeText(keywordInput.value);

      return offices.filter(office => {
        const wardOk = ward === "all" || office.ward === ward;
        const typeOk = type === "all" || office.type === type;

        const searchTarget = normalizeText([
          office.ward,
          office.type,
          office.name,
          office.address,
          office.phone,
          office.keywords || "",
          office.source || ""
        ].join(" "));

        const keywordOk = !keyword || searchTarget.includes(keyword);

        return wardOk && typeOk && keywordOk;
      });
    }

    function updateCounts(data){
      totalCountEl.textContent = `全件: ${data.length}`;
      hokatsuCountEl.textContent = `地域包括等: ${data.filter(o => o.type === "地域包括支援センター" || o.type === "総合相談窓口（ブランチ）").length}`;
      kyotakuCountEl.textContent = `居宅: ${data.filter(o => o.type === "居宅介護支援事業所").length}`;
      houmonCountEl.textContent = `訪問介護: ${data.filter(o => o.type === "訪問介護").length}`;
    }

    function renderList(data){
      listEl.innerHTML = "";

      if (!data.length) {
        listEl.innerHTML = `<div class="empty">該当する営業先がありません。</div>`;
        updateCounts(data);
        return;
      }

      data.forEach((office, index) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="topline">
            <div style="flex:1;">
              <div class="name">${office.name}</div>
            </div>
            <div class="order-badge">${index + 1}</div>
          </div>

          <div class="meta">
            区: ${office.ward}<br>
            種別: ${office.type}<br>
            住所: ${office.address}<br>
            電話: ${office.phone || ""}
          </div>

          <div class="badge-row">
            <span class="badge">${office.type}</span>
            <span class="badge">${office.ward}</span>
          </div>

          <div class="small">
            出典: ${office.source || "未設定"}<br>
            確認日: ${office.checked || "未設定"}
          </div>
        `;
        listEl.appendChild(card);
      });

      updateCounts(data);
    }

    function applyFilters(){
      const data = getFilteredData();
      renderList(data);
      statusEl.innerHTML = "絞り込みを反映しました。";
    }

    function resetFilters(){
      wardFilter.value = "all";
      typeFilter.value = "all";
      keywordInput.value = "";
      renderList(offices);
      statusEl.innerHTML = "表示をリセットしました。";
    }

    function parseCsvLine(line){
      const result = [];
      let cur = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') {
            cur += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === "," && !inQuotes) {
          result.push(cur);
          cur = "";
        } else {
          cur += ch;
        }
      }
      result.push(cur);
      return result.map(v => v.trim());
    }

    async function decodeCsvFile(file){
      const buffer = await file.arrayBuffer();
      const bytes = new Uint8Array(buffer);

      try {
        return new TextDecoder("utf-8", { fatal: true }).decode(bytes);
      } catch (e) {}

      try {
        return new TextDecoder("shift-jis").decode(bytes);
      } catch (e) {}

      return new TextDecoder("utf-8").decode(bytes);
    }

    function findHeaderIndex(headers, candidates){
      const normalizedHeaders = headers.map(h => normalizeText(h));
      for (const c of candidates) {
        const target = normalizeText(c);
        const idx = normalizedHeaders.findIndex(h => h.includes(target));
        if (idx !== -1) return idx;
      }
      return -1;
    }

    function addOfficeRecord({ ward, type, name, address, phone, source, checked }){
      if (!name || !address) return false;

      const fixedWard = ward || wardFromAddress(address);
      if (!fixedWard) return false;

      const id = safeId(`${fixedWard}-${type}-${name}-${phone}-${address}`);
      if (offices.some(o => o.id === id)) return false;

      offices.push({
        id,
        ward: fixedWard,
        type,
        name,
        address,
        phone: phone || "",
        source: source || "",
        checked: checked || "",
        keywords: buildKeywords(fixedWard, name)
      });
      return true;
    }

    async function loadCsv(){
      const files = Array.from(csvFileEl.files || []);
      if (!files.length) {
        alert("CSVを選んでください。");
        return;
      }

      let importedTotal = 0;
      const messages = [];

      for (const file of files) {
        try {
          const text = await decodeCsvFile(file);
          const lines = text.split(/\r?\n/).filter(Boolean);

          if (lines.length < 2) {
            messages.push(`${file.name}: データがありません`);
            continue;
          }

          const headers = parseCsvLine(lines[0]);

          const idxServiceCode = findHeaderIndex(headers, ["サービス種別コード"]);
          const idxName = findHeaderIndex(headers, ["事業所_名称（漢字）", "事業所名称", "名称（漢字）"]);
          const idxAddress = findHeaderIndex(headers, ["事業所_住所（漢字）", "事業所所在地", "住所（漢字）", "所在地"]);
          const idxPhone = findHeaderIndex(headers, ["事業所_電話番号", "電話番号"]);
          const idxStartDate = findHeaderIndex(headers, ["指定有効開始年月日", "指定日", "異動年月日"]);
          const idxOfficeNo = findHeaderIndex(headers, ["事業所番号"]);
          const idxHoujin = findHeaderIndex(headers, ["法人名称"]);

          if (idxName === -1 || idxAddress === -1) {
            messages.push(`${file.name}: 必要な列が見つかりません`);
            continue;
          }

          let fileImported = 0;

          for (let i = 1; i < lines.length; i++) {
            const cols = parseCsvLine(lines[i]);

            const name = idxName !== -1 ? (cols[idxName] || "") : "";
            const address = idxAddress !== -1 ? (cols[idxAddress] || "") : "";
            const phone = idxPhone !== -1 ? (cols[idxPhone] || "") : "";
            const checked = idxStartDate !== -1 ? (cols[idxStartDate] || "") : "";
            const officeNo = idxOfficeNo !== -1 ? (cols[idxOfficeNo] || "") : "";
            const houjin = idxHoujin !== -1 ? (cols[idxHoujin] || "") : "";
            const serviceCode = idxServiceCode !== -1 ? (cols[idxServiceCode] || "") : "";

            if (!name || !address) continue;

            const ward = wardFromAddress(address);
            if (!ward) continue;

            let type = "";
            if (serviceCode === "43") {
              type = "居宅介護支援事業所";
            } else if (serviceCode === "11") {
              type = "訪問介護";
            } else if (normalizeText(file.name).includes("houmon")) {
              type = "訪問介護";
            } else if (normalizeText(file.name).includes("kyotaku")) {
              type = "居宅介護支援事業所";
            } else {
              continue;
            }

            const added = addOfficeRecord({
              ward,
              type,
              name,
              address,
              phone,
              source: `${file.name} (${officeNo || houjin || serviceCode})`,
              checked
            });

            if (added) fileImported++;
          }

          importedTotal += fileImported;
          messages.push(`${file.name}: ${fileImported}件追加`);
        } catch (error) {
          console.error(error);
          messages.push(`${file.name}: 読み込み失敗`);
        }
      }

      rebuildWardOptions();
      renderList(offices);

      if (importedTotal === 0) {
        statusEl.innerHTML = `追加できませんでした。<br>${messages.join("<br>")}`;
        alert("0件でした。青い表示欄のメッセージを見てください。");
      } else {
        statusEl.innerHTML = `読み込み完了<br>${messages.join("<br>")}`;
      }
    }

    function importSimpleCSV(){
      const text = document.getElementById("csvInput").value.trim();
      if (!text) {
        alert("CSVを貼ってください。");
        return;
      }

      const lines = text.split(/\r?\n/).filter(Boolean);
      let count = 0;

      lines.forEach((line, index) => {
        const cols = line.split(",").map(v => v.trim());
        if (index === 0 && cols[0] === "区名") return;
        if (cols.length < 10) return;

        const [ward, type, name, address, phone, source, checked, keywords] = [
          cols[0], cols[1], cols[2], cols[3], cols[4], cols[7], cols[8], cols[9]
        ];

        const id = safeId(`${ward}-${name}-${phone}`);
        if (offices.some(o => o.id === id)) return;

        offices.push({
          id,
          ward,
          type,
          name,
          address,
          phone,
          source: source || "CSV追加",
          checked: checked || "",
          keywords: keywords || ""
        });
        count++;
      });

      rebuildWardOptions();
      renderList(offices);
      statusEl.innerHTML = `${count}件 追加しました。`;
    }

    document.getElementById("searchBtn").addEventListener("click", applyFilters);
    document.getElementById("resetBtn").addEventListener("click", resetFilters);
    document.getElementById("loadCsvBtn").addEventListener("click", loadCsv);

    rebuildWardOptions();
    renderList(offices);
  </script>
</body>
</html>
