<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>営業アプリ｜今日回る先ルート版</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Sans","Yu Gothic","Meiryo",sans-serif;
      background: #f4f7fb;
      color: #222;
    }
    header {
      background: linear-gradient(135deg,#2146d0,#4f7cff);
      color: #fff;
      padding: 16px;
      text-align: center;
      font-size: 22px;
      font-weight: 700;
    }
    .wrap {
      max-width: 1150px;
      margin: 0 auto;
      padding: 14px;
    }
    .box {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 22px rgba(0,0,0,.08);
      margin-bottom: 14px;
      padding: 14px;
    }
    .notice {
      background: #fff8e8;
      border: 1px solid #f3d38f;
      color: #6c4d00;
      border-radius: 12px;
      padding: 12px;
      line-height: 1.8;
      font-size: 13px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
    select, input, button {
      border: 1px solid #dbe3f2;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
    }
    input[type="text"] {
      min-width: 220px;
      flex: 1;
    }
    button {
      border: none;
      background: #2146d0;
      color: #fff;
      cursor: pointer;
    }
    button:hover { opacity: .92; }
    .green-btn { background: #16a34a; }
    .orange-btn { background: #f97316; }
    .purple-btn { background: #7a34c2; }
    .gray-btn { background: #6b7280; }
    .status {
      margin-top: 8px;
      padding: 10px 12px;
      background: #f7faff;
      border: 1px solid #e1e9fb;
      border-radius: 12px;
      font-size: 13px;
      color: #3b4d6b;
      line-height: 1.7;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }
    .chip {
      background: #eef3ff;
      color: #2146d0;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
    }
    .list {
      display: grid;
      gap: 10px;
    }
    .card {
      border: 1px solid #dbe3f2;
      border-radius: 14px;
      background: #fafcff;
      padding: 14px;
    }
    .card.today {
      border: 2px solid #7a34c2;
      background: #fcf8ff;
    }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
    }
    .name {
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 6px;
      color: #21345f;
    }
    .order {
      min-width: 34px;
      height: 34px;
      border-radius: 999px;
      background: #2146d0;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .meta {
      font-size: 14px;
      line-height: 1.8;
      color: #445;
    }
    .badge-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .badge {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef3ff;
      color: #2146d0;
    }
    .badge.todaybadge {
      background: #f4eaff;
      color: #7a34c2;
    }
    .small {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
      line-height: 1.6;
    }
    .distance {
      margin-top: 8px;
      font-size: 13px;
      font-weight: 700;
      color: #2146d0;
    }
    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
      align-items: center;
    }
    .map-link {
      display: inline-block;
      text-decoration: none;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 10px;
      background: #2146d0;
      color: #fff;
    }
    .map-link.orange { background: #f97316; }
    .map-link.green { background: #16a34a; }
    .today-check {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      font-weight: 700;
      color: #7a34c2;
    }
    .empty {
      text-align: center;
      color: #666;
      padding: 20px;
      border: 1px dashed #ccd6ea;
      border-radius: 12px;
      background: #fcfdff;
    }
  </style>
</head>
<body>
  <header>営業アプリ｜今日回る先ルート版</header>

  <div class="wrap">
    <div class="box">
      <div class="notice">
        地域包括・ブランチは最初から表示されます。<br>
        202604kyotaku01.csv / 202604kyotaku02.csv を読み込むと、居宅介護支援事業所だけ追加します。<br>
        「今日回る」にチェックした先だけで巡回ルートを作れます。
      </div>
    </div>

    <div class="box">
      <div class="row">
        <select id="wardFilter">
          <option value="all">全区</option>
        </select>

        <select id="typeFilter">
          <option value="all">全種別</option>
          <option value="地域包括支援センター">地域包括支援センター</option>
          <option value="総合相談窓口（ブランチ）">総合相談窓口（ブランチ）</option>
          <option value="居宅介護支援事業所">居宅介護支援事業所</option>
        </select>

        <select id="todayFilter">
          <option value="all">今日回る先 全て</option>
          <option value="today">今日回る先のみ</option>
          <option value="not_today">今日回る先以外</option>
        </select>

        <input id="keyword" type="text" placeholder="区名・駅名・事業所名・住所・電話で検索" />
      </div>

      <div class="row">
        <input id="startPlace" type="text" placeholder="出発地点を入力（例: 本町駅 / 天王寺駅 / 梅田駅）" />
        <button id="searchBtn">絞り込み</button>
        <button id="resetBtn">リセット</button>
        <button id="routeBtn" class="green-btn">巡回ルート作成</button>
        <button id="todayRouteBtn" class="purple-btn">今日回る先でルート作成</button>
      </div>

      <div class="row">
        <input id="csvFile" type="file" accept=".csv,text/csv" multiple />
        <button id="loadCsvBtn" class="orange-btn">居宅CSV読込</button>
        <button id="clearTodayBtn" class="gray-btn">今日回るチェック解除</button>
      </div>

      <div id="status" class="status">地域包括・ブランチを表示中です。</div>

      <div class="chips">
        <div class="chip" id="totalCount">全件: 0</div>
        <div class="chip" id="hokatsuCount">地域包括等: 0</div>
        <div class="chip" id="kyotakuCount">居宅: 0</div>
        <div class="chip" id="todayCount">今日回る: 0</div>
      </div>
    </div>

    <div class="box">
      <div id="list" class="list"></div>
    </div>
  </div>

  <script>
    const OSAKA_WARDS = [
      "北区","都島区","福島区","此花区","中央区","西区","港区","大正区","天王寺区","浪速区",
      "西淀川区","淀川区","東淀川区","東成区","生野区","旭区","城東区","鶴見区","阿倍野区",
      "住之江区","住吉区","東住吉区","平野区","西成区"
    ];

    const offices = [
      { id:"hokatsu-chuo", ward:"中央区", type:"地域包括支援センター", name:"中央区地域包括支援センター", address:"大阪市中央区上本町西2-5-25", phone:"06-6763-8139", source:"初期登録", checked:"2026-04-22", keywords:"中央区 谷町六丁目駅 谷六 上本町", lat:34.6730, lng:135.5203 },
      { id:"hokatsu-chuo-hokubu", ward:"中央区", type:"地域包括支援センター", name:"中央区北部地域包括支援センター", address:"大阪市中央区農人橋3-1-3", phone:"06-6944-2116", source:"初期登録", checked:"2026-04-22", keywords:"中央区 本町駅 堺筋本町駅 谷町四丁目駅", lat:34.6809, lng:135.5125 },
      { id:"hokatsu-kita", ward:"北区", type:"地域包括支援センター", name:"北区地域包括支援センター", address:"大阪市北区神山町15-11", phone:"06-6313-5568", source:"初期登録", checked:"2026-04-22", keywords:"北区 扇町駅 中崎町駅 梅田駅", lat:34.7054, lng:135.5069 },
      { id:"branch-kita-umeda", ward:"北区", type:"総合相談窓口（ブランチ）", name:"梅田東ブランチ", address:"大阪市北区芝田2-10-39", phone:"06-6372-0804", source:"初期登録", checked:"2026-04-22", keywords:"北区 梅田駅 大阪駅 中津駅", lat:34.7079, lng:135.4946 },
      { id:"hokatsu-tennoji", ward:"天王寺区", type:"地域包括支援センター", name:"天王寺区地域包括支援センター", address:"大阪市天王寺区六万体町5-26", phone:"06-6774-3386", source:"初期登録", checked:"2026-04-22", keywords:"天王寺区 四天王寺前夕陽ヶ丘駅 谷町九丁目駅", lat:34.6589, lng:135.5166 },
      { id:"hokatsu-abeno", ward:"阿倍野区", type:"地域包括支援センター", name:"阿倍野区地域包括支援センター", address:"大阪市阿倍野区帝塚山1-3-8", phone:"06-6628-1400", source:"初期登録", checked:"2026-04-22", keywords:"阿倍野区 姫松駅 帝塚山駅 阿倍野駅", lat:34.6258, lng:135.5015 }
    ];

    const wardFilter = document.getElementById("wardFilter");
    const typeFilter = document.getElementById("typeFilter");
    const todayFilter = document.getElementById("todayFilter");
    const keywordInput = document.getElementById("keyword");
    const startPlaceInput = document.getElementById("startPlace");
    const listEl = document.getElementById("list");
    const statusEl = document.getElementById("status");
    const totalCountEl = document.getElementById("totalCount");
    const hokatsuCountEl = document.getElementById("hokatsuCount");
    const kyotakuCountEl = document.getElementById("kyotakuCount");
    const todayCountEl = document.getElementById("todayCount");
    const csvFileEl = document.getElementById("csvFile");

    function normalizeText(text){
      return String(text || "")
        .toLowerCase()
        .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
        .replace(/\s+/g, " ")
        .replace(/　/g, " ")
        .replace(/ヶ/g, "ケ")
        .replace(/之/g, "の")
        .trim();
    }

    function wardFromAddress(address){
      return OSAKA_WARDS.find(w => String(address || "").includes(w)) || "";
    }

    function safeId(text){
      return text.toLowerCase().replace(/\s+/g, "-").replace(/[^\w\u3040-\u30ff\u3400-\u9fff-]/g, "").slice(0, 80) || ("office-" + Date.now());
    }

    function rebuildWardOptions(){
      const wards = [...new Set(offices.map(o => o.ward))].sort((a,b)=>a.localeCompare(b,"ja"));
      wardFilter.innerHTML = '<option value="all">全区</option>';
      wards.forEach(ward => {
        const option = document.createElement("option");
        option.value = ward;
        option.textContent = ward;
        wardFilter.appendChild(option);
      });
    }

    function isTodayTarget(id){
      return localStorage.getItem("today_target_" + id) === "1";
    }

    function setTodayTarget(id, value){
      localStorage.setItem("today_target_" + id, value ? "1" : "0");
    }

    function clearTodayTargets(){
      offices.forEach(o => localStorage.removeItem("today_target_" + o.id));
    }

    function getFilteredData(){
      const ward = wardFilter.value;
      const type = typeFilter.value;
      const todayMode = todayFilter.value;
      const keyword = normalizeText(keywordInput.value);

      return offices.filter(office => {
        const wardOk = ward === "all" || office.ward === ward;
        const typeOk = type === "all" || office.type === type;
        const todayOk =
          todayMode === "all" ||
          (todayMode === "today" && isTodayTarget(office.id)) ||
          (todayMode === "not_today" && !isTodayTarget(office.id));

        const searchTarget = normalizeText([
          office.ward,
          office.type,
          office.name,
          office.address,
          office.phone,
          office.keywords || ""
        ].join(" "));

        const keywordOk = !keyword || searchTarget.includes(keyword);
        return wardOk && typeOk && todayOk && keywordOk;
      });
    }

    function updateCounts(data){
      totalCountEl.textContent = `全件: ${data.length}`;
      hokatsuCountEl.textContent = `地域包括等: ${data.filter(o => o.type === "地域包括支援センター" || o.type === "総合相談窓口（ブランチ）").length}`;
      kyotakuCountEl.textContent = `居宅: ${data.filter(o => o.type === "居宅介護支援事業所").length}`;
      todayCountEl.textContent = `今日回る: ${offices.filter(o => isTodayTarget(o.id)).length}`;
    }

    function createMapLinks(startPlace, address){
      const destination = encodeURIComponent(address);
      const origin = startPlace ? `&origin=${encodeURIComponent(startPlace)}` : "";
      return {
        walking: `https://www.google.com/maps/dir/?api=1${origin}&destination=${destination}&travelmode=walking`,
        transit: `https://www.google.com/maps/dir/?api=1${origin}&destination=${destination}&travelmode=transit`,
        search: `https://www.google.com/maps/search/?api=1&query=${destination}`
      };
    }

    function renderList(data, startPlace = ""){
      listEl.innerHTML = "";

      if (!data.length) {
        listEl.innerHTML = '<div class="empty">該当する営業先がありません。</div>';
        updateCounts(data);
        return;
      }

      data.forEach((office, index) => {
        const card = document.createElement("div");
        card.className = "card" + (isTodayTarget(office.id) ? " today" : "");

        const distText = office.routeDistanceText ? `<div class="distance">${office.routeDistanceText}</div>` : "";
        const links = createMapLinks(startPlace, office.address);

        card.innerHTML = `
          <div class="topline">
            <div style="flex:1;">
              <div class="name">${office.name}</div>
            </div>
            <div class="order">${index + 1}</div>
          </div>

          <div class="meta">
            区: ${office.ward}<br>
            種別: ${office.type}<br>
            住所: ${office.address}<br>
            電話: ${office.phone || ""}
          </div>

          ${distText}

          <div class="badge-row">
            <span class="badge">${office.type}</span>
            <span class="badge">${office.ward}</span>
            ${isTodayTarget(office.id) ? '<span class="badge todaybadge">今日回る</span>' : ''}
          </div>

          <div class="link-row">
            <label class="today-check">
              <input type="checkbox" class="today-toggle" ${isTodayTarget(office.id) ? "checked" : ""}>
              今日回る
            </label>
            <a class="map-link green" href="${links.walking}" target="_blank" rel="noopener noreferrer">徒歩ルート</a>
            <a class="map-link orange" href="${links.transit}" target="_blank" rel="noopener noreferrer">電車・バス</a>
            <a class="map-link" href="${links.search}" target="_blank" rel="noopener noreferrer">地図で開く</a>
          </div>

          <div class="small">
            出典: ${office.source || "未設定"}<br>
            確認日: ${office.checked || "未設定"}
          </div>
        `;
        listEl.appendChild(card);

        card.querySelector(".today-toggle").addEventListener("change", (e) => {
          setTodayTarget(office.id, e.target.checked);
          renderList(getFilteredData().map(o => ({ ...o, routeDistanceText: o.routeDistanceText || "" })), startPlaceInput.value.trim());
        });
      });

      updateCounts(data);
    }

    function applyFilters(){
      const data = getFilteredData().map(o => ({ ...o, routeDistanceText: "" }));
      renderList(data, startPlaceInput.value.trim());
      statusEl.textContent = "絞り込みを反映しました。";
    }

    function resetFilters(){
      wardFilter.value = "all";
      typeFilter.value = "all";
      todayFilter.value = "all";
      keywordInput.value = "";
      startPlaceInput.value = "";
      const data = offices.map(o => ({ ...o, routeDistanceText: "" }));
      renderList(data, "");
      statusEl.textContent = "表示をリセットしました。";
    }

    function parseCsvLine(line){
      const result = [];
      let cur = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') {
          if (inQuotes && line[i + 1] === '"') {
            cur += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (ch === "," && !inQuotes) {
          result.push(cur);
          cur = "";
        } else {
          cur += ch;
        }
      }
      result.push(cur);
      return result.map(v => v.trim());
    }

    async function decodeCsvFile(file){
      const buffer = await file.arrayBuffer();
      const bytes = new Uint8Array(buffer);

      try {
        return new TextDecoder("utf-8", { fatal: true }).decode(bytes);
      } catch (e) {}

      try {
        return new TextDecoder("shift-jis").decode(bytes);
      } catch (e) {}

      return new TextDecoder("utf-8").decode(bytes);
    }

    function findHeaderIndex(headers, candidates){
      const normalizedHeaders = headers.map(h => normalizeText(h));
      for (const c of candidates) {
        const target = normalizeText(c);
        const idx = normalizedHeaders.findIndex(h => h.includes(target));
        if (idx !== -1) return idx;
      }
      return -1;
    }

    function addOfficeRecord({ ward, type, name, address, phone, source, checked }){
      if (!name || !address) return false;

      const fixedWard = ward || wardFromAddress(address);
      if (!fixedWard) return false;

      const id = safeId(`${fixedWard}-${type}-${name}-${phone}-${address}`);
      if (offices.some(o => o.id === id)) return false;

      offices.push({
        id,
        ward: fixedWard,
        type,
        name,
        address,
        phone: phone || "",
        source: source || "",
        checked: checked || "",
        keywords: `${fixedWard} ${name}`,
        lat: null,
        lng: null
      });
      return true;
    }

    async function loadCsv(){
      const files = Array.from(csvFileEl.files || []);
      if (!files.length) {
        alert("CSVを選んでください。");
        return;
      }

      let importedTotal = 0;
      const messages = [];

      for (const file of files) {
        try {
          const text = await decodeCsvFile(file);
          const lines = text.split(/\r?\n/).filter(Boolean);

          if (lines.length < 2) {
            messages.push(`${file.name}: データがありません`);
            continue;
          }

          const headers = parseCsvLine(lines[0]);

          const idxServiceCode = findHeaderIndex(headers, ["サービス種別コード"]);
          const idxName = findHeaderIndex(headers, ["事業所_名称（漢字）", "事業所名称", "名称（漢字）"]);
          const idxAddress = findHeaderIndex(headers, ["事業所_住所（漢字）", "事業所所在地", "住所（漢字）", "所在地"]);
          const idxPhone = findHeaderIndex(headers, ["事業所_電話番号", "電話番号"]);
          const idxStartDate = findHeaderIndex(headers, ["指定有効開始年月日", "指定日", "異動年月日"]);
          const idxOfficeNo = findHeaderIndex(headers, ["事業所番号"]);

          if (idxName === -1 || idxAddress === -1) {
            messages.push(`${file.name}: 必要な列が見つかりません`);
            continue;
          }

          let fileImported = 0;

          for (let i = 1; i < lines.length; i++) {
            const cols = parseCsvLine(lines[i]);

            const name = idxName !== -1 ? (cols[idxName] || "") : "";
            const address = idxAddress !== -1 ? (cols[idxAddress] || "") : "";
            const phone = idxPhone !== -1 ? (cols[idxPhone] || "") : "";
            const checked = idxStartDate !== -1 ? (cols[idxStartDate] || "") : "";
            const officeNo = idxOfficeNo !== -1 ? (cols[idxOfficeNo] || "") : "";
            const serviceCode = idxServiceCode !== -1 ? (cols[idxServiceCode] || "") : "";

            if (!name || !address) continue;
            const ward = wardFromAddress(address);
            if (!ward) continue;
            if (serviceCode !== "43") continue;

            const added = addOfficeRecord({
              ward,
              type: "居宅介護支援事業所",
              name,
              address,
              phone,
              source: `${file.name} (${officeNo || "43"})`,
              checked
            });

            if (added) fileImported++;
          }

          importedTotal += fileImported;
          messages.push(`${file.name}: ${fileImported}件追加`);
        } catch (error) {
          console.error(error);
          messages.push(`${file.name}: 読み込み失敗`);
        }
      }

      rebuildWardOptions();
      renderList(offices.map(o => ({ ...o, routeDistanceText: "" })), startPlaceInput.value.trim());

      if (importedTotal === 0) {
        statusEl.innerHTML = `追加できませんでした。 ${messages.join(" / ")}`;
      } else {
        statusEl.innerHTML = `読み込み完了。 ${messages.join(" / ")}`;
      }
    }

    async function geocodePlace(query){
      try {
        const url = `https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&accept-language=ja&q=${encodeURIComponent(query + " 大阪")}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!data.length) return null;
        return {
          lat: parseFloat(data[0].lat),
          lng: parseFloat(data[0].lon),
          label: data[0].display_name
        };
      } catch (e) {
        return null;
      }
    }

    function haversine(lat1, lon1, lat2, lon2){
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function formatDistance(km){
      if (km < 1) return `${Math.round(km * 1000)}m`;
      return `${km.toFixed(2)}km`;
    }

    async function buildRoute(useTodayOnly = false){
      const startPlace = startPlaceInput.value.trim();
      if (!startPlace) {
        alert("出発地点を入れてください。");
        return;
      }

      let filtered = getFilteredData();
      if (useTodayOnly) {
        filtered = filtered.filter(o => isTodayTarget(o.id));
      }

      if (!filtered.length) {
        alert(useTodayOnly ? "今日回る先がありません。" : "巡回対象がありません。");
        return;
      }

      statusEl.textContent = "出発地点を検索しています…";
      const start = await geocodePlace(startPlace);

      if (!start) {
        statusEl.textContent = "出発地点が見つかりませんでした。";
        alert("出発地点が見つかりませんでした。");
        return;
      }

      const geocoded = [];
      for (const office of filtered) {
        if (office.lat && office.lng) {
          geocoded.push({ ...office });
          continue;
        }

        const found = await geocodePlace(office.address);
        if (found) {
          office.lat = found.lat;
          office.lng = found.lng;
          geocoded.push({ ...office });
        }
      }

      if (!geocoded.length) {
        statusEl.textContent = "巡回ルートを作れませんでした。";
        return;
      }

      const remaining = geocoded.map(o => ({ ...o }));
      const ordered = [];
      let current = { lat: start.lat, lng: start.lng };

      while (remaining.length) {
        let bestIndex = 0;
        let bestDistance = Infinity;

        remaining.forEach((office, i) => {
          const d = haversine(current.lat, current.lng, office.lat, office.lng);
          if (d < bestDistance) {
            bestDistance = d;
            bestIndex = i;
          }
        });

        const next = remaining.splice(bestIndex, 1)[0];
        next.routeDistanceText = ordered.length === 0
          ? `出発地点「${startPlace}」から ${formatDistance(bestDistance)}`
          : `前の営業先から ${formatDistance(bestDistance)}`;

        ordered.push(next);
        current = { lat: next.lat, lng: next.lng };
      }

      renderList(ordered, startPlace);
      statusEl.innerHTML = useTodayOnly
        ? `今日回る先で巡回ルートを作成しました。 出発地点: ${start.label}`
        : `巡回ルートを作成しました。 出発地点: ${start.label}`;
    }

    document.getElementById("searchBtn").addEventListener("click", applyFilters);
    document.getElementById("resetBtn").addEventListener("click", resetFilters);
    document.getElementById("loadCsvBtn").addEventListener("click", loadCsv);
    document.getElementById("routeBtn").addEventListener("click", () => buildRoute(false));
    document.getElementById("todayRouteBtn").addEventListener("click", () => buildRoute(true));
    document.getElementById("clearTodayBtn").addEventListener("click", () => {
      clearTodayTargets();
      renderList(getFilteredData().map(o => ({ ...o, routeDistanceText: "" })), startPlaceInput.value.trim());
      statusEl.textContent = "今日回るチェックを解除しました。";
    });

    rebuildWardOptions();
    renderList(offices.map(o => ({ ...o, routeDistanceText: "" })), "");
  </script>
</body>
